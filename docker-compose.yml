services:
  postgres:
    image: postgres:16-alpine
    container_name: rls_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rls_backup}
      POSTGRES_USER: ${DB_USER:-rls}
      POSTGRES_PASSWORD: ${DB_PASS:-rls_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rls_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rls} -d ${DB_NAME:-rls_backup}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rls_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-rls_backup}
      DB_USER: ${DB_USER:-rls}
      DB_PASS: ${DB_PASS:-rls_secret_2024}
      JWT_SECRET: ${JWT_SECRET:-rls-super-secret-jwt-key-change-this}
      # Aceitar requisições do nginx (qualquer origem interna)
      FRONTEND_URL: "*"
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-rls@2024}
    volumes:
      - uploads_data:/app/uploads
    # Porta exposta apenas para debug — o tráfego normal passa pelo nginx
    ports:
      - "${BACKEND_PORT:-3010}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rls_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rls_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3009}:80"
    depends_on:
      - backend
    networks:
      - rls_network
    volumes:
      - uploads_data:/app/internal_uploads:ro

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  rls_network:
    driver: bridge
