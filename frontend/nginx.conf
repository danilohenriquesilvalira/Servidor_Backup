server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Health check — acessivel externamente (usado pelo app desktop)
    location /health {
        proxy_pass http://backend:3001/health;
        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy reverso: /api vai para o backend internamente (funciona em qualquer IP/rede)
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 1g;
    }

    # RLS TURBO: Entrega direta (Zero-Copy) de arquivos grandes
    location /internal_uploads/ {
        internal;
        alias /app/internal_uploads/;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
    }

    # Cache para assets estáticos
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: todas as rotas redirecionam para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
